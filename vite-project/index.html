<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pranesh Portfolio</title>
    <style>
      @keyframes spin-loader {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-glow {
        0%, 100% {
          transform: scale(0.95);
          text-shadow: 0 0 10px rgba(32, 178, 166, 0.2);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.05);
          text-shadow: 0 0 25px rgba(32, 178, 166, 0.6);
          opacity: 1;
        }
      }
      .preloader-hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Fullscreen Page Preloader -->
    <div id="preloader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0f1418;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s ease;
    ">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <div style="
          font-size: 3.5rem;
          font-weight: 800;
          color: #20b2a6;
          font-family: system-ui, -apple-system, sans-serif;
          letter-spacing: -2px;
          position: relative;
          animation: pulse-glow 2s infinite ease-in-out;
        ">
          PS<span style="color: #ffffff;">.</span>
        </div>
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid rgba(32, 178, 166, 0.1);
          border-radius: 50%;
          border-top-color: #20b2a6;
          animation: spin-loader 1s infinite linear;
        "></div>
        <div style="
          font-size: 0.875rem;
          color: #7a8491;
          font-family: system-ui, -apple-system, sans-serif;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          font-weight: 500;
        ">
          Loading Experience
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
